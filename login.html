<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Metric POS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0B1628;--blue:#1A6FE8;--blue2:#2B85FF;
  --accent:#00E5C3;--surface:#111C2E;--surface2:#162236;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#E8EDF5;--text2:#8B9BB4;
  --danger:#E8384F;
}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
  position:relative;overflow:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(26,111,232,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,111,232,0.05) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;
}
.bg-glow{
  position:fixed;width:600px;height:600px;
  background:radial-gradient(circle,rgba(26,111,232,0.1) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.login-card{
  background:var(--surface);
  border:1px solid var(--border2);border-radius:20px;
  padding:2.5rem;width:100%;max-width:420px;
  position:relative;z-index:1;
}
.logo-row{
  display:flex;align-items:center;gap:.6rem;
  justify-content:center;margin-bottom:2rem;
}
.logo-icon{
  width:38px;height:38px;background:var(--blue);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;color:#fff;
}
.logo-text{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--text)}
.logo-text span{color:var(--accent)}

.login-title{
  font-family:'Syne',sans-serif;
  font-size:1.4rem;font-weight:800;
  color:#fff;text-align:center;margin-bottom:.3rem;
}
.login-sub{font-size:.85rem;color:var(--text2);text-align:center;margin-bottom:2rem}

.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;font-weight:500;color:var(--text2);margin-bottom:.35rem}
.field select,.field input{
  width:100%;padding:.7rem 1rem;
  background:var(--surface2);
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:.92rem;font-family:'DM Sans',sans-serif;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.field select{cursor:pointer}
.field input:focus,.field select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(26,111,232,0.15);
}
.field input::placeholder{color:var(--text2)}
.field select option{background:var(--surface2)}

.password-wrap{position:relative}
.password-wrap input{padding-right:2.8rem}
.toggle-pass{
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text2);cursor:pointer;font-size:.9rem;
}

.alert{
  padding:.8rem 1rem;border-radius:8px;
  font-size:.85rem;margin-bottom:1rem;display:none;
}
.alert-error{background:rgba(232,56,79,0.1);border:1px solid rgba(232,56,79,0.25);color:#F87185}

.btn-login{
  width:100%;padding:.85rem;border-radius:10px;
  background:var(--blue);color:#fff;
  border:none;font-size:.95rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;margin-top:.25rem;
}
.btn-login:hover:not(:disabled){background:var(--blue2)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.btn-spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

.login-footer{
  margin-top:1.5rem;text-align:center;
  font-size:.82rem;color:var(--text2);
}
.login-footer a{color:var(--blue2);text-decoration:none}
.login-footer a:hover{text-decoration:underline}

.version-tag{
  position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;
  font-size:.7rem;color:rgba(139,155,180,0.4);letter-spacing:.5px;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-card">
  <div class="logo-row">
    <div class="logo-icon">MP</div>
    <div class="logo-text">Metric<span>POS</span></div>
  </div>

  <div class="login-title">Bienvenido de nuevo</div>
  <p class="login-sub">Ingresa tus credenciales para continuar</p>

  <div class="alert alert-error" id="alertErr"></div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label>Sucursal</label>
      <select id="sucursal">
        <option value="">Cargando sucursales...</option>
      </select>
    </div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="Tu usuario" autocomplete="username">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
        <button type="button" class="toggle-pass" id="togglePass">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btnLogin">
      <span id="btnText">Ingresar al Sistema</span>
      <div class="btn-spinner" id="btnSpinner"></div>
    </button>
  </form>

  <div class="login-footer">
    ¿No tienes cuenta? <a href="registro.html">Regístrate gratis →</a>
  </div>
</div>

<div class="version-tag">Metric POS v7.3 · Honduras · SAR</div>

<script>
const API = 'https://metricpos-production.up.railway.app';

// ── Check if already logged in ────────────────────────────
if(localStorage.getItem('mp_token')){
  window.location.href = 'app.html';
}

// ── Load sucursales (público: GET /api/sucursales) ────────
async function loadSucursales(){
  const sel = document.getElementById('sucursal');
  try{
    const res = await fetch(API + '/api/sucursales');
    if(!res.ok) throw new Error();
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.sucursales || []);
    sel.innerHTML = list.length
      ? list.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')
      : '<option value="">Sin sucursales</option>';
  } catch {
    sel.innerHTML = '<option value="">Casa Matriz</option>';
  }
}
loadSucursales();

// ── Password toggle ───────────────────────────────────────
document.getElementById('togglePass').addEventListener('click', () => {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

// ── Alert ─────────────────────────────────────────────────
function showErr(msg){
  const el = document.getElementById('alertErr');
  el.textContent = msg; el.style.display = 'block';
}

// ── Loading ───────────────────────────────────────────────
function setLoading(on){
  document.getElementById('btnLogin').disabled = on;
  document.getElementById('btnText').style.display  = on ? 'none'  : 'block';
  document.getElementById('btnSpinner').style.display = on ? 'block' : 'none';
}

// ── Login — POST /api/auth/login { username, password } ──
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('alertErr').style.display = 'none';

  const sucursal_id = document.getElementById('sucursal').value;
  const username    = document.getElementById('usuario').value.trim();
  const password    = document.getElementById('password').value;

  if(!username || !password){
    showErr('Completa usuario y contraseña.'); return;
  }

  setLoading(true);
  try{
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json().catch(() => ({}));

    if(res.ok && data.token){
      localStorage.setItem('mp_token',      data.token);
      localStorage.setItem('mp_user',       JSON.stringify(data.user));
      localStorage.setItem('mp_sucursal_id', data.user?.sucursal_id || sucursal_id);
      window.location.href = 'app.html';
    } else {
      showErr(data?.error || 'Usuario o contraseña incorrectos.');
    }
  } catch {
    showErr('No se pudo conectar con el servidor.');
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
